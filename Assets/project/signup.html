<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Sign Up</title>
	<style type="text/css">
		main {
			margin: 0 auto;
			padding: 10px;
			border: 2px solid black;
			display: flex;
			flex-wrap: wrap;
			max-width: 1200px;
		}
		.man1 {
			flex: 1;
			padding: 10px;
			border: 2px solid black;
			flex-wrap: wrap;
			max-width: 500px;
		}
		.man2 {
			flex: 1;
			padding-top: 30px;
			padding: 10px;
			border: 2px solid black;
			flex-wrap: wrap;
			background-color: red;
			max-width: 500px;
		}
		.title {
			margin: 10px auto;
			color: white;
		}
		h1 {
			justify-content: center;
			align-items: center;
			text-align: center;
			
		}
		p {
			justify-content: center;
			align-items: center;
			text-align: center;
			margin-bottom: 0px;
		}
		#p1 {
			justify-content: center;
			align-items: center;
			text-align: center;
			margin-bottom: 0px;
		}
		#a1 {
			margin-top: 0;
			justify-content: center;
			align-items: center;
			text-align: center;

		}
		.btnn {
			margin: 10px;
			padding: 10px;
		}
		button {
			padding: 10px;
			font-size: 15px;
			width: 20%;
			border: 1px solid white;
			border-radius: 20px;
			background: transparent;
			color: white;
		}
		.login {
			margin: 10px auto;
			padding: 10px;
			justify-content: center;
			align-items: center;
			text-align: center;
		}
		.login input {
			margin: 5px;
			padding: 5px;
		}
		#o1 a {
			justify-content: center;
			align-items: center;
			text-align: center;
		}
		.btn1 {
			margin: 10px;
			padding: 10px;
		}
		.btn1 button {
			margin: 5px;
			padding: 5px;
			border: 1px solid black;
			border-radius: 10px;
			color: black;
		}
		.sym {
			margin: auto;
			display: flex;
			width: 20%;
		}
		.logo {
			flex: 1;
			margin: 10px;
			padding: 20px;
			border: 2px solid black;
			width: 5px;
			border-radius: 100%;
		}
	</style>
</head>
<body>
	<main>
		<div class="man1">
			<div class="title1">
				<h1>Sign In</h1>
				<div class="sym">
					<div class="logo"></div>
					<div class="logo"></div>
					<div class="logo"></div>
				</div>
				<p id="p1">or use your account</p>
				<div class="login">
					<label for="Email"></label>
					<input type="Email" name="Email" placeholder="Email" required><br>
					<label for="Password"></label>
					<input type="Password" name="Password" placeholder="Password" required>
				</div>
				<p id="o1"><a href="">Forgot your password?</a></p>
				<div class="btn1">
					<center><button type="submit">SIGN IN</button></center>
				</div>
			</div>
		</div>
		<div class="man2">
			<div class="title">
				<h1>Hello,Friend!</h1>
				<p>Enter your personal details and start</p>
				<p #a1>journey with us</p>
			</div>
			<div class="btnn">
				<center><button type="submit">Sign Up</button></center>
			</div>
		</div>
	</main>
</body>
</html>
