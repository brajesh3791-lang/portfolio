<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Art World Logo</title>
	<style type="text/css">
		body {
			background-color: #f5f5f5;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			margin: 0;
			font-family: 'Arial', sans-serif;
		}

		.logo-container {
			display: flex;
			align-items: center;
			background-color: #ffffff;
			border: 2px solid #333;
			padding: 20px 40px;
			border-radius: 12px;
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
		}

		.logo-icon {
			width: 60px;
			height: 60px;
			background: radial-gradient(circle at 30% 30%, #ff6f61, #d84315);
			border-radius: 50%;
			position: relative;
			margin-right: 20px;
		}

		.logo-icon::before {
			content: '';
			position: absolute;
			top: 15px;
			left: 15px;
			width: 30px;
			height: 30px;
			background-color: #ffffff;
			border-radius: 50%;
			box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
		}

		.logo-text {
			font-size: 28px;
			font-weight: bold;
			color: #333;
		}

		.logo-text span {
			color: #ff6f61;
		}

		.tagline {
			font-size: 14px;
			color: #777;
			margin-top: 5px;
			text-align: center;
		}
	</style>
</head>
<body>

	<div class="logo-container">
		<div class="logo-icon"></div>
	</div>
	<div class="logo-text"><span>Art</span>World</div>
	<div class="tagline">creativity Unleashed</div>

</body>
</html>
