<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Hover1</title>
	<style>
		body {
			margin: 0;
			padding: 0;
			font-family: sans-serif;
/*			background: linear-gradient(purple, black);*/
			background-repeat: no-repeat;
		}
		.hidden {
			display: none;
			position: absolute;
			top: 50%;
			left: 50%;
			width: 100%;
			background-color: dimgray;
			z-index: 2;
			padding: 10%;
			transform: translate(100%,-50%);
		}
		.More:hover .hidden {
			display: flex;
			width: 100px;
			height: 90vh;
		}
		.A1 {
			flex: 1;
			position: relative;
			border: 1px solid black;
			margin: 10px;
			padding: 10px;
		}
	</style>
</head>
<body>
	<div class="More">
		<button>More</button>
		<div class="hidden">
			<div class="A1"></div>
			<div class="A1"></div>
			<div class="A1"></div>
			<div class="A1"></div>
		</div>
	</div>
</body>
</html>
