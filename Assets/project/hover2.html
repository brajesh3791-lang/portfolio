<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hover1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: linear-gradient(purple, black);
            background-repeat: no-repeat;
            min-height: 100vh;
            max-width: 1500px;
            display: flex;
            justify-content: right;
            align-items: self-start;
        }

        .More {
            position: relative;
        }

        .More button {
            padding-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            rotate: 90deg;
        }

        .More button:hover {
            background-color: #555;
        }

        .hidden {
            position: absolute;
            top: 100%;
            left: 0;
            width: 460px;
            background-color: dimgray;
            padding: 10px;
            z-index: 2;
/*            display: flex;*/
            flex-direction: row;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .More:hover .hidden {
            opacity: 1;
            visibility: visible;
        }

        .A1 {
            flex: 1;
            border: 1px solid black;
            margin: 5px 0;
            padding: 10px;
            background-color: #444;
            color: white;
            text-align: center;
            border-radius: 5px;
        }
        .A1:nth-child(1) {
            background-color: darkred;
        }
        .A1:nth-child(2) {
            background-color: yellow;
        }
        .A1:nth-child(3) {
            background-color: green;
        }
        .A1:nth-child(4) {
            background-color: cyan;
        }
        .A2 {
            border: 1px solid black;
            margin: 5px 0;
            padding: 10px;
            background-color: #444;
            color: white;
            text-align: center;
            border-radius: 5px;
        }
        .clrs {
            display: flex;
        }
    </style>
</head>
<body>
    <div class="More">
        <button>More</button>
        <div class="hidden">
            <div class="clrs">
                <div class="A1">Item 1</div>
                <div class="A1">Item 2</div>
                <div class="A1">Item 3</div>
                <div class="A1">Item 4</div>
            </div>
            <div class="theme">
                <div class="A2">Dark Theme</div>
                <div class="A2">Light Theme</div>
                <div class="A2">Small Theme</div>
                <div class="A2">Big Theme</div>
            </div>
        </div>
    </div>
</body>
</html>
