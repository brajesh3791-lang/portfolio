		<fieldset>
			<legend>Student Basic Details</legend>
			<label for="Student-Name">1.Student Name :</label>
			<input type="text" name="Student-Name" placeholder="Student-Name" id="Student-Name">
			<label for="Mid-Name">2.Mid Name :</label>
			<input type="text" name="Mid-Name" placeholder="Mid-Name" id="Mid-Name">
			<label for="Last-Name">3.Last Name :</label>
			<input type="text" name="Last-Name" placeholder="Last-Name" id="Last-Name">
			<br>
			<label for="Mobile">4.Mobile No.:</label>
			<input type="text" name="Mobile" placeholder="Mobile" id="Mobile">
			<label for="Alternative-Mobile">5.Alternative-Mobile No.:</label>
			<input type="text" name="Alternative-Mobile" placeholder="Alternative-Mobile" id="Alternative-Mobile">
			<label for="email">6.email</label>
			<input type="text" name="email" placeholder="xyz@gmail.com" id="email">
			<br>
			<label for="Gender">7.Gender :</label>
			<label for="Gender">Male</label>
			<input type="radio" name="Gender" id="Gender">
			<label for="Gender">Female</label>
			<input type="radio" name="Gender" id="Gender">
			<label for="Gender">Other</label>
			<input type="radio" name="Gender" id="Gender">
			<label for="D.O.P">8.Date of Birth:</label>
			<input type="date" name="D.O.P" id="D.O.P">
		</fieldset>
		<fieldset>
			<legend>Qualifications</legend>
			<label for="Highest-Qualification">Highest-Qualification</label>

			<label for="Photo">Upload Photo</label>

			<label for="Photo">Upload Document</label>
			<input type="file" name="Photo">
		</fieldset>
