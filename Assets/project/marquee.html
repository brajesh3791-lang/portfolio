<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Marquee</title>
	<style type="text/css">
		body {
			font-family: 'Arial', sans-serif;
			background-color: #f4f4f4;
			text-align: center;
			padding: 50px;
		}
		marquee {
			font-size: 24px;
			color: #333;
			background-color: #fff;
			padding: 10px;
			border: 1px solid #ccc;
			width: 80%;
			margin: 0 auto;
		}
	</style>
</head>
<body>
	<h1>Marquee</h1>
	<marquee scrolldelay="99" direction="left" onmouseover="this.stop();" onmouseout="this.start();">
		--------------------------नगर निगम मथुरा वृन्दावन
	</marquee>
</body>
</html>
