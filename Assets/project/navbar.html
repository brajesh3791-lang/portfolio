<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Simple Navigation Bar</title>
	<style type="text/css">
		/*	Basic reset	*/
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: Arial, sans-serif;
		}

		/*	Navbar container	*/
		.navbar {
			background-color: #333;
			overflow: hidden;
		}
		/*	Navbar links	*/
		.navbar a {
			float: left;
			display: block;
			color: white;
			text-align: center;
			padding: 10px 20px;
			text-decoration: none;
			transition: background-color 0.3s;
		}

		/*	Hover effec	*/
		.navbar a:hover {
			background-color: #ddd;
			color: black;
		}

		/*	Active/current link	*/
		.navbar a.active {
			background-color: #04AA6D;
			color: white;
		}

		/*	Responsive design	*/
		@media screen and (max-width: 600px) {
			.navbar a {
				float: none;
				display: block;
				text-align: left;
			}
		}
	</style>
</head>
<body>
	<!-- Navigation Bar -->
	<div class="navbar">
		<a class="active" href="#home">Home</a>
		<a href="#about">About</a>
		<a href="service">service</a>
		<a href="contact">Contact</a>
	</div>

	</div>
 -->
</body>
</html>
