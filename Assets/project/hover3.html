<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hover1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: linear-gradient(purple, black);
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: right;
            align-items: flex-start;
        }

        .More {
            position: relative;
            margin: 20px;
        }

        .More button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.3s;
        }

        .More button:hover {
            background-color: #555;
        }

        .More button {
            transform: rotate(90deg);
        }

        .hidden {
            position: absolute;
            top: 100%;
            right: 0;
            width: 460px;
            background-color: dimgray;
            padding: 10px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transform: translateX(100%);
            transition: opacity 0.3s, visibility 0.3s, transform 0.3s;
        }

        .More.active .hidden {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }

        .A1 {
            flex: 1;
            border: 1px solid black;
            margin: 5px;
            padding: 10px;
            background-color: #444;
            color: white;
            text-align: center;
            border-radius: 5px;
        }

        .A1:nth-child(1) {
            background-color: darkred;
        }

        .A1:nth-child(2) {
            background-color: yellow;
            color: black;
        }

        .A1:nth-child(3) {
            background-color: green;
        }

        .A1:nth-child(4) {
            background-color: cyan;
            color: black;
        }

        .A2 {
            border: 1px solid black;
            margin: 5px;
            padding: 10px;
            background-color: #444;
            color: white;
            text-align: center;
            border-radius: 5px;
        }

        .clrs {
            display: flex;
            flex-direction: row;
        }

        .theme {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div class="More">
        <button>More</button>
        <div class="hidden">
            <div class="clrs">
                <div class="A1">Item 1</div>
                <div class="A1">Item 2</div>
                <div class="A1">Item 3</div>
                <div class="A1">Item 4</div>
            </div>
            <div class="theme">
                <div class="A2">Dark Theme</div>
                <div class="A2">Light Theme</div>
                <div class="A2">Small Theme</div>
                <div class="A2">Big Theme</div>
            </div>
        </div>
    </div>

        const button = moreDiv.querySelector('button');

        button.addEventListener('click', () => {
            moreDiv.classList.toggle('active');
        });
    </script> -->
</body>
</html>
